# Configurações do Banco H2
spring.datasource.url=jdbc:h2:mem:${H2_DBNAME}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${H2_USERNAME}
spring.datasource.password=${H2_PASSWORD}
api.security.token.secret=${JWT_SECRET}

# Configurações do JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Habilitar o Console do H2 no navegador (localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console